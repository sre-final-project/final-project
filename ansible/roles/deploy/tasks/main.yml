---
- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Clone or update project repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    update: true
    force: true
  become_user: ubuntu

- name: Start ecommerce stack with Docker Compose
  ansible.builtin.shell:
    cmd: docker-compose up -d --no-build 2>&1 || docker-compose up -d 2>&1
    chdir: "{{ app_dir }}"
  become_user: ubuntu
  ignore_errors: true

- name: Show running containers
  ansible.builtin.command:
    cmd: docker-compose ps
    chdir: "{{ app_dir }}"
  register: compose_ps
  changed_when: false

- name: Print Docker Compose status
  ansible.builtin.debug:
    var: compose_ps.stdout_lines