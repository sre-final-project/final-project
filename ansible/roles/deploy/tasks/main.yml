---
- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Clone or update project repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    update: true
    force: true
  become_user: ubuntu

- name: Start ecommerce stack with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - "{{ compose_file }}"
    build: always
    state: present

- name: Show running containers
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: "{{ app_dir }}"
  register: compose_ps
  changed_when: false

- name: Print Docker Compose status
  ansible.builtin.debug:
    var: compose_ps.stdout_lines
