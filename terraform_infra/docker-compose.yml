version: '3.8'

services:
  ecommerce-ui:
    image: dntranstudy/ecommerce-ui:2.0.0
    container_name: ecommerce-ui
    ports:
      - "4000:4000"
    environment:
      - REACT_APP_PROFILE_API_HOST=http://profile-management:3003
      - REACT_APP_SHIPPING_API_HOST=http://shipping-and-handling:8080
      - REACT_APP_CONTACT_API_HOST=http://contact-support-team:8000
      - REACT_APP_INVENTORY_API_HOST=http://product-inventory:3002
      - REACT_APP_PRODUCT_API_HOST=http://product-catalog:3001
      - REACT_APP_ORDER_API_HOST=http://order-management:9090
    depends_on:
      profile-management:
        condition: service_healthy
      shipping-and-handling:
        condition: service_healthy
      contact-support-team:
        condition: service_healthy
      product-inventory:
        condition: service_healthy
      product-catalog:
        condition: service_healthy
      order-management:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  profile-management:
    image: dntranstudy/profile-management:2.1.0
    container_name: profile-management
    ports:
      - "3003:3003"
    environment:
      - MYSQL_PORT=3306
      - MYSQL_HOST=mysql-profile-management
      - MYSQL_DATABASE=profile_management
      - MYSQL_USER=profile_user
      - MYSQL_PASSWORD=profile_password
      - NODE_ENV=production
    depends_on:
      mysql-profile-management:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mysql-profile-management:
    image: mysql:8.0
    container_name: mysql-profile-management
    environment:
      - MYSQL_DATABASE=profile_management
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_PASSWORD=profile_password
      - MYSQL_USER=profile_user
    volumes:
      - mysql_profile_management_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  shipping-and-handling:
    image: dntranstudy/shipping-and-handling:2.0.0
    container_name: shipping-and-handling
    ports:
      - "8080:8080"
    depends_on:
      mongodb-shipping:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb-shipping:27017/shipping
      - NODE_ENV=production
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb-shipping:
    image: mongo:5.0
    container_name: mongodb-shipping
    volumes:
      - mongodb_shipping_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=shipping
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  contact-support-team:
    image: dntranstudy/contact-support-team:2.0.0
    container_name: contact-support-team
    ports:
      - "8000:8000"
    depends_on:
      mongodb-contact-support:
        condition: service_healthy
    environment:
      - MONGODB_HOST=mongodb-contact-support
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=contact_support
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb-contact-support:
    image: mongo:5.0
    container_name: mongodb-contact-support
    volumes:
      - mongodb_contact_support_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=contact_support
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  product-inventory:
    image: dntranstudy/product-inventory:2.0.0
    container_name: product-inventory
    ports:
      - "3002:3002"
    environment:
      - POSTGRES_HOST=postgres-product-inventory
      - POSTGRES_PORT=5432
      - POSTGRES_DB=product_inventory
      - POSTGRES_USER=inventory_user
      - POSTGRES_PASSWORD=inventory_password
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres-product-inventory:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres-product-inventory:
    image: postgres:14
    container_name: postgres-product-inventory
    environment:
      - POSTGRES_DB=product_inventory
      - POSTGRES_USER=inventory_user
      - POSTGRES_PASSWORD=inventory_password
    volumes:
      - postgres_product_inventory_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  product-catalog:
    image: dntranstudy/product-catalog:2.0.0
    container_name: product-catalog
    ports:
      - "3001:3001"
    depends_on:
      mongodb-product-catalog:
        condition: service_healthy
    environment:
      - MONGODB_HOST=mongodb-product-catalog
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=product_catalog
      - NODE_ENV=production
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mongodb-product-catalog:
    image: mongo:5.0
    container_name: mongodb-product-catalog
    volumes:
      - mongodb_product_catalog_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=product_catalog
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-management:
    build:
      context: ./order-management
      dockerfile: Dockerfile
    container_name: order-management
    ports:
      - "8083:9090"
    environment:
      - PRODUCT_INVENTORY_API_HOST=http://product-inventory:3002
      - PRODUCT_CATALOG_API_HOST=http://product-catalog:3001
      - SHIPPING_HANDLING_API_HOST=http://shipping-and-handling:8080
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb-order-management:27017/order_management
      - SPRING_PROFILES_ACTIVE=production
      - SERVER_SERVLET_CONTEXT_PATH=/api
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics,prometheus
    depends_on:
      product-inventory:
        condition: service_healthy
      product-catalog:
        condition: service_healthy
      shipping-and-handling:
        condition: service_healthy
      mongodb-order-management:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  mongodb-order-management:
    image: mongo:5.0
    container_name: mongodb-order-management
    volumes:
      - mongodb_order_management_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=order_management
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_contact_support_data:
  mongodb_order_management_data:
  mongodb_product_catalog_data:
  postgres_product_inventory_data:
  mysql_profile_management_data:
  mongodb_shipping_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  app-network:
    driver: bridge