apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-management
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-management
  template:
    metadata:
      labels:
        app: order-management
    spec:
      containers:
        - name: order-management
          image: containerized_ecommerce_microservices-main-order-management:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          env:
            - name: PRODUCT_INVENTORY_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: product_inventory_api
            - name: PRODUCT_CATALOG_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: product_catalog_api
            - name: SHIPPING_HANDLING_API_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: shipping_api
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: order_mongodb_uri
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: health,info,prometheus,metrics
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              value: always
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 90
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-management
  namespace: ecommerce
spec:
  selector:
    app: order-management
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-ui
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-ui
  template:
    metadata:
      labels:
        app: ecommerce-ui
    spec:
      containers:
        - name: ecommerce-ui
          image: dntranstudy/ecommerce-ui:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: REACT_APP_PROFILE_API_HOST
              value: http://profile-management:3003
            - name: REACT_APP_SHIPPING_API_HOST
              value: http://shipping-and-handling:8080
            - name: REACT_APP_CONTACT_API_HOST
              value: http://contact-support-team:8000
            - name: REACT_APP_INVENTORY_API_HOST
              value: http://product-inventory:3002
            - name: REACT_APP_PRODUCT_API_HOST
              value: http://product-catalog:3001
            - name: REACT_APP_ORDER_API_HOST
              value: http://order-management:9090
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-ui
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: ecommerce-ui
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30400
